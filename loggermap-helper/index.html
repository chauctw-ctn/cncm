<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bản đồ tổng thể | CAWACO</title>
    <link rel="stylesheet" href="/main/dashboard.css">
    <link rel="stylesheet" href="/module-shell.css">
    <link rel="stylesheet" href="/loggermap/map.css">
    <link rel="stylesheet" href="/auth/auth.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="map-page">
    <div id="map" class="with-sidebar"></div>
    <div class="loading-overlay hidden" id="loading">
        <div class="spinner"></div>
        <p>Đang tải dữ liệu...</p>
    </div>

    <div id="chart-modal" class="modal">
        <div class="modal-content" style="max-width: 900px;">
            <div class="modal-header">
                <h2 id="chart-modal-title">Biểu đồ dữ liệu trạm</h2>
                <button class="modal-close" id="close-chart-modal">&times;</button>
            </div>
            <div style="padding: 24px;">
                <div class="form-group">
                    <div id="chart-parameters" style="display: flex; gap: 15px; margin-bottom: 15px; flex-wrap: wrap;"></div>
                </div>
                <div class="form-group">
                    <label>Khoảng thời gian:</label>
                    <div style="display: flex; gap: 10px; align-items: center;">
                        <input type="text" id="chart-start-date" class="setting-input" placeholder="dd/mm/yyyy" pattern="\d{2}/\d{2}/\d{4}" style="flex: 1;">
                        <span>đến</span>
                        <input type="text" id="chart-end-date" class="setting-input" placeholder="dd/mm/yyyy" pattern="\d{2}/\d{2}/\d{4}" style="flex: 1;">
                        <button id="load-chart-btn" class="btn-primary" style="white-space: nowrap;">Xem biểu đồ</button>
                    </div>
                </div>
                <div id="chart-loading" style="text-align: center; padding: 40px; display: none;">
                    <div class="spinner" style="margin: 0 auto 10px;"></div>
                    <p>Đang tải dữ liệu...</p>
                </div>
                <div id="chart-container" style="position: relative; height: 400px; margin-top: 20px;">
                    <canvas id="water-level-chart"></canvas>
                </div>
                <div id="chart-error" class="modal-error" style="margin-top: 15px;"></div>
            </div>
        </div>
    </div>

    <script src="/header/header-loader.js"></script>
    <script src="/sidebar/sidebar-loader.js"></script>
    <script src="/auth/auth.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="/loggermap/map.js"></script>
        
</body>
</html>
