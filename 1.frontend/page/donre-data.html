<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Dashboard Test</title>

    <link rel="stylesheet" href="/page/layout/layout.css">

    <style>
        .page-content {
            margin-top: var(--header-height, 70px);
            height: calc(100vh - var(--header-height, 70px));
            padding: 16px;
            overflow: hidden;

            background: #07142f;
            color: white;
        }

        .test-card {
            height: 100%;
            border-radius: 16px;
            background: #0d1b3e;

            display: flex;
            align-items: center;
            justify-content: center;

            font-size: 32px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <!-- Layout được inject vào đây -->
    <div id="layout-root"></div>

    <!-- Nội dung trang -->
    <main class="page-content">
        <div class="test-card">
            DASHBOARD DỮ LIỆU SỞ TNMT
        </div>
    </main>

    <!-- Loader layout -->
    <script src="/page/page-loader.js"></script>

</body>
</html>
