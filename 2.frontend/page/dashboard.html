<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>

    <link rel="stylesheet" href="/page/layout/layout.css">
    <link rel="stylesheet" href="/assets/pages/dashboard.css">
</head>

<body>
    <div id="layout-container"></div>

    <main class="page-content">
        <section class="page-header">
            <h2>Tổng Quan Hệ Thống</h2>
            <span id="current-time"></span>
        </section>

        <section class="dashboard-summary">
            <div class="summary-card">
                <h3>Tổng Trạm</h3>
                <span id="totalStations">0</span>
            </div>

            <div class="summary-card success">
                <h3>Đang Hoạt Động</h3>
                <span id="onlineStations">0</span>
            </div>

            <div class="summary-card danger">
                <h3>Mất Kết Nối</h3>
                <span id="offlineStations">0</span>
            </div>

            <div class="summary-card primary">
                <h3>Tổng Lưu Lượng</h3>
                <span id="totalFlow">0</span>
            </div>
        </section>
    </main>

    <script src="/assets/js/app.js"></script>
    <script src="/assets/js/pages/dashboard.js"></script>
</body>
</html>
