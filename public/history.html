<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử</title>

  <link rel="stylesheet" href="/shared/layout.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/vn.js"></script>

  <script src="/shared/auth.js"></script>
  <script src="/shared/layout.js"></script>

  <style>
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
      align-items: end;
    }

    .filter-actions {
      margin-top: 12px;
    }

    .history-table-wrap {
      overflow: auto;
      max-height: calc(100vh - 310px);
      border: 1px solid #e5e7eb;
      border-radius: 10px;
    }

    .history-table {
      min-width: 1100px;
    }

    .history-table thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fafc;
      border-bottom: 2px solid #cbd5e1;
      text-align: center;
    }

    .logger-cell {
      font-weight: bold;
      color: #0f172a;
    }

    .tag-cell {
      color: #475569;
      margin-top: 4px;
      font-size: 13px;
    }

    .threshold-box {
      display: grid;
      grid-template-columns: 1fr 1fr auto;
      gap: 6px;
      align-items: center;
      min-width: 270px;
    }

    .threshold-box input {
      min-width: 80px;
      padding: 6px;
    }

    .threshold-box button {
      padding: 6px 10px;
    }

    .status-ok {
      color: #16a34a;
      font-weight: bold;
    }

    .status-high,
    .status-low {
      color: #dc2626;
      font-weight: bold;
    }

    .small-muted {
      color: #64748b;
      font-size: 12px;
    }

    @media (max-width: 1200px) {
      .filter-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }
  </style>
</head>

<body>
<main class="page-content">

  <div class="card">
    <h2>Lịch sử dữ liệu</h2>

    <div class="filter-grid">
      <div>
        <label>Logger ID</label>
        <select id="logger_id">
          <option value="">Tất cả logger</option>
        </select>
      </div>

      <div>
        <label>Tag</label>
        <select id="tag_key">
          <option value="">Tất cả tag</option>
          <option value="flow">flow</option>
          <option value="level">level</option>
          <option value="totalIndex">totalIndex</option>
          <option value="pH">pH</option>
          <option value="TDS">TDS</option>
          <option value="amino">amino</option>
          <option value="nitrat">nitrat</option>
        </select>
      </div>

      <div>
        <label>Nguồn</label>
        <select id="source">
          <option value="">Tất cả nguồn</option>
          <option value="mqtt">mqtt</option>
          <option value="scada">scada</option>
          <option value="tva">tva</option>
          <option value="monre">monre</option>
        </select>
      </div>

      <div>
        <label>Từ thời gian</label>
        <input id="from" type="text" readonly placeholder="Chọn thời gian bắt đầu">
      </div>

      <div>
        <label>Đến thời gian</label>
        <input id="to" type="text" readonly placeholder="Chọn thời gian kết thúc">
      </div>
    </div>

    <div class="filter-actions">
      <button onclick="setLastHour()">1 giờ gần nhất</button>
      <button onclick="setTodayRange()">Hôm nay</button>
      <button onclick="setCurrentMonthRange()">Tháng này</button>
      <button class="gray" onclick="clearFilter()">Xoá lọc</button>
      <button onclick="loadHistory()">Lọc dữ liệu</button>

      <input id="limit" type="number" value="500" style="width:120px" title="Limit">
    </div>
  </div>

  <div class="card">
    <h3>Kết quả</h3>
    <div id="summary" class="small-muted">Chưa tải dữ liệu</div>

    <div class="history-table-wrap">
      <table class="history-table">
        <thead>
          <tr>
            <th style="width:170px">Thời gian</th>
            <th style="width:260px">Logger ID / Các tag</th>
            <th style="width:130px">Giá trị tag</th>
            <th style="width:100px">Đơn vị</th>
            <th style="width:100px">Nguồn</th>
            <th style="width:330px">Ngưỡng cảnh báo: Min / Max</th>
          </tr>
        </thead>
        <tbody id="historyTable">
          <tr>
            <td colspan="6"><i>Chưa có dữ liệu</i></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>

<script>
AppLayout.initLayout("Lịch sử");

let thresholdMap = {};

function initDatePickers() {
  flatpickr("#from", {
    enableTime: true,
    enableSeconds: true,
    time_24hr: true,
    dateFormat: "Y-m-d H:i:S",
    locale: "vn"
  });

  flatpickr("#to", {
    enableTime: true,
    enableSeconds: true,
    time_24hr: true,
    dateFormat: "Y-m-d H:i:S",
    locale: "vn"
  });
}

async function api(url, options = {}) {
  const res = await fetch(url, options);
  return res.json();
}

async function loadLoggers() {
  const json = await api("/api/logger/readings/map");

  if (!json.success) return;

  json.data.forEach(l => {
    const opt = document.createElement("option");
    opt.value = l.logger_id;
    opt.textContent = `${l.name || l.logger_id} (${l.logger_id})`;
    logger_id.appendChild(opt);
  });
}

async function loadThresholds() {
  const json = await api("/api/logger/thresholds");

  thresholdMap = {};

  if (!json.success || !Array.isArray(json.data)) return;

  json.data.forEach(item => {
    thresholdMap[`${item.logger_id}__${item.tag_key}`] = item;
  });
}

function getThreshold(loggerId, tagKey) {
  return thresholdMap[`${loggerId}__${tagKey}`] || {};
}

function getStatus(row, threshold) {
  if (!threshold || threshold.warning_enabled === 0) return "OK";

  const value = Number(row.value);

  if (threshold.min_value !== null && threshold.min_value !== undefined && value < Number(threshold.min_value)) {
    return "LOW";
  }

  if (threshold.max_value !== null && threshold.max_value !== undefined && value > Number(threshold.max_value)) {
    return "HIGH";
  }

  return "OK";
}

async function loadHistory() {
  await loadThresholds();

  const params = new URLSearchParams();

  if (logger_id.value) params.set("logger_id", logger_id.value);
  if (tag_key.value) params.set("tag_key", tag_key.value);
  if (source.value) params.set("source", source.value);
  if (from.value) params.set("from", from.value);
  if (to.value) params.set("to", to.value);
  if (limit.value) params.set("limit", limit.value);

  const json = await api(`/api/logger/history?${params.toString()}`);

  if (!json.success) {
    historyTable.innerHTML = `
      <tr>
        <td colspan="6">Lỗi tải dữ liệu</td>
      </tr>
    `;
    return;
  }

  summary.textContent = `Tổng dòng: ${json.total || json.data.length}`;

  renderHistory(json.data || []);
}

function renderHistory(rows) {
  if (!rows.length) {
    historyTable.innerHTML = `
      <tr>
        <td colspan="6"><i>Không có dữ liệu</i></td>
      </tr>
    `;
    return;
  }

  historyTable.innerHTML = rows.map(row => {
    const threshold = getThreshold(row.logger_id, row.tag_key);
    const status = getStatus(row, threshold);
    const safeKey = makeRowKey(row.logger_id, row.tag_key);

    return `
      <tr>
        <td>
          ${escapeHtml(row.data_ts || "")}
        </td>

        <td>
          <div class="logger-cell">
            ${escapeHtml(row.logger_name || row.logger_id || "")}
          </div>
          <div class="small-muted">
            ${escapeHtml(row.logger_id || "")}
          </div>
          <div class="tag-cell">
            Tag: <b>${escapeHtml(row.tag_name || row.tag_key || "")}</b>
            <span class="small-muted">(${escapeHtml(row.tag_key || "")})</span>
          </div>
        </td>

        <td>
          <b>${row.value ?? "--"}</b>
          <div class="${status === "OK" ? "status-ok" : status === "HIGH" ? "status-high" : "status-low"}">
            ${status}
          </div>
        </td>

        <td>
          ${escapeHtml(row.unit || "")}
        </td>

        <td>
          ${escapeHtml(row.source || "")}
        </td>

        <td>
          <div class="threshold-box">
            <input
              id="min_${safeKey}"
              type="number"
              placeholder="Min"
              value="${threshold.min_value ?? ""}"
            >

            <input
              id="max_${safeKey}"
              type="number"
              placeholder="Max"
              value="${threshold.max_value ?? ""}"
            >

            <button onclick="saveThreshold('${escapeJs(row.logger_id)}','${escapeJs(row.tag_key)}','${safeKey}')">
              Lưu
            </button>
          </div>
          <div class="small-muted">
            ${escapeHtml(threshold.message || "")}
          </div>
        </td>
      </tr>
    `;
  }).join("");
}

async function saveThreshold(loggerId, tagKey, safeKey) {
  const minEl = document.getElementById(`min_${safeKey}`);
  const maxEl = document.getElementById(`max_${safeKey}`);

  const body = {
    logger_id: loggerId,
    tag_key: tagKey,
    min_value: nullableNumber(minEl.value),
    max_value: nullableNumber(maxEl.value),
    warning_enabled: 1,
    message: `Cảnh báo ${loggerId}/${tagKey}`
  };

  const json = await api("/api/logger/thresholds", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify(body)
  });

  if (!json.success) {
    alert(json.message || "Lỗi lưu ngưỡng");
    return;
  }

  await loadHistory();
}

function setLastHour() {
  const now = new Date();
  const start = new Date(now.getTime() - 3600000);

  from.value = formatDateTime(start);
  to.value = formatDateTime(now);
}

function setTodayRange() {
  const now = new Date();
  const d = formatDate(now);

  from.value = `${d} 00:00:00`;
  to.value = `${d} 23:59:59`;
}

function setCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const start = new Date(y, m, 1);
  const end = new Date(y, m + 1, 0);

  from.value = `${formatDate(start)} 00:00:00`;
  to.value = `${formatDate(end)} 23:59:59`;
}

function clearFilter() {
  logger_id.value = "";
  tag_key.value = "";
  source.value = "";
  from.value = "";
  to.value = "";
  limit.value = "500";
  historyTable.innerHTML = `
    <tr>
      <td colspan="6"><i>Chưa có dữ liệu</i></td>
    </tr>
  `;
  summary.textContent = "Đã xoá bộ lọc";
}

function nullableNumber(value) {
  if (value === "" || value === null || value === undefined) return null;

  const num = Number(value);
  return Number.isNaN(num) ? null : num;
}

function formatDate(date) {
  const pad = v => String(v).padStart(2, "0");
  return [
    date.getFullYear(),
    pad(date.getMonth() + 1),
    pad(date.getDate())
  ].join("-");
}

function formatDateTime(date) {
  const pad = v => String(v).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

function makeRowKey(loggerId, tagKey) {
  return String(`${loggerId}_${tagKey}`).replace(/[^a-zA-Z0-9_-]/g, "_");
}

function escapeHtml(value) {
  return String(value)
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function escapeJs(value) {
  return String(value)
    .replaceAll("\\", "\\\\")
    .replaceAll("'", "\\'");
}

initDatePickers();
loadLoggers();
setTodayRange();
loadHistory();
</script>
</body>
</html>
