<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Lịch sử</title>

  <link rel="stylesheet" href="/shared/layout.css">
  <link rel="stylesheet" href="/history.css">

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/vn.js"></script>

  <script src="/shared/auth.js"></script>
  <script src="/shared/layout.js"></script>
</head>

<body>
<script>
  AppLayout.initLayout("Lịch sử");
</script>

<main class="page-content">
  <div class="card history-filter-card">
    <!-- <h2>Lịch sử dữ liệu theo chu kỳ</h2> -->
    <div class="history-title">
      <h2>BẢNG THỐNG KÊ DỮ LIỆU LỊCH SỬ</h2>
    </div> 

    <div class="filter-grid">
      <div>
        <label>Từ thời gian</label>
        <input id="from" type="text" readonly>
      </div>

      <div>
        <label>Đến thời gian</label>
        <input id="to" type="text" readonly>
      </div>

      <div>
        <label>Chu kỳ</label>
        <select id="interval">
          <option value="5m">5 phút</option>
          <option value="10m">10 phút</option>
          <option value="15m">15 phút</option>
          <option value="30m">30 phút</option>
          <option value="1h">1 giờ</option>
          <option value="2h">2 giờ</option>
          <option value="3h">3 giờ</option>
          <option value="6h">6 giờ</option>
          <option value="12h">12 giờ</option>
          <option value="1d">1 ngày</option>
        </select>
      </div>

      <div>
        <label>Logger</label>
        <div class="multi-select" id="loggerDropdown">
          <button type="button" class="multi-select-btn" onclick="toggleDropdown('loggerDropdown')">
            Tất cả Logger
          </button>
          <div id="loggerCheckList" class="multi-select-list"></div>
        </div>
      </div>

      <div>
        <label>Tag</label>
        <div class="multi-select" id="tagDropdown">
          <button type="button" class="multi-select-btn" onclick="toggleDropdown('tagDropdown')">
            Tất cả Tag
          </button>

          <div id="tagCheckList" class="multi-select-list">
            <label><input type="checkbox" class="tag-check" value="flow"> flow</label>
            <label><input type="checkbox" class="tag-check" value="level"> level</label>
            <label><input type="checkbox" class="tag-check" value="totalIndex"> totalIndex</label>
            <label><input type="checkbox" class="tag-check" value="pH"> pH</label>
            <label><input type="checkbox" class="tag-check" value="TDS"> TDS</label>
            <label><input type="checkbox" class="tag-check" value="amino"> amino</label>
            <label><input type="checkbox" class="tag-check" value="nitrat"> nitrat</label>
          </div>
        </div>
      </div>

      <div>
        <label>Nguồn</label>
        <div class="multi-select" id="sourceDropdown">
          <button type="button" class="multi-select-btn" onclick="toggleDropdown('sourceDropdown')">
            Tất cả Nguồn
          </button>

          <div class="multi-select-list">
            <label><input type="checkbox" class="source-check" value="mqtt"> mqtt</label>
            <label><input type="checkbox" class="source-check" value="scada"> scada</label>
            <label><input type="checkbox" class="source-check" value="tva"> tva</label>
            <label><input type="checkbox" class="source-check" value="monre"> monre</label>
          </div>
        </div>
      </div>
    </div>

    <!-- <div class="filter-actions">
      <button onclick="setLastHour()">1 giờ gần nhất</button>
      <button onclick="setTodayRange()">Hôm nay</button>
      <button onclick="setCurrentMonthRange()">Tháng này</button>
      <button class="gray" onclick="clearFilters()">Xoá lọc</button>
      <button onclick="loadHistoryTable()">Tải bảng</button>

      <label>Số hàng</label>
      <select id="pageSize" onchange="changePageSize()">
        <option value="auto" selected>Tự động</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="50">50</option>
      </select>

      <label>Raw limit</label>
      <input id="limit" type="number" value="50000">
    </div> -->
    <div class="filter-actions">
      <button onclick="setLastHour()">1 giờ gần nhất</button>
      <button onclick="setTodayRange()">Hôm nay</button>
      <button onclick="setCurrentMonthRange()">Tháng này</button>
      <button class="gray" onclick="clearFilters()">Xoá lọc</button>
      <button onclick="loadHistoryTable()">Tải bảng</button>

      <div class="action-spacer"></div>

      <label>Số hàng</label>
      <select id="pageSize" onchange="changePageSize()">
        <option value="auto" selected>Tự động</option>
        <option value="10">10</option>
        <option value="15">15</option>
        <option value="20">20</option>
        <option value="30">30</option>
        <option value="50">50</option>
      </select>

      <label>Raw limit</label>
      <input id="limit" type="number" value="50000">

    </div>
  </div>

  <div class="card history-table-card">
    <h3>Bảng dữ liệu</h3>

    <div id="summary" class="summary">Chưa tải dữ liệu</div>

    <div class="history-table-wrap">
      <table class="pivot-table">
        <thead id="pivotHead">
          <tr>
            <th>Thời gian</th>
          </tr>
        </thead>

        <tbody id="pivotBody">
          <tr>
            <td>Chưa có dữ liệu</td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="pagination">
      <button onclick="firstPage()">Đầu</button>
      <button onclick="prevPage()">Trước</button>

      <span id="pageInfo">Trang 0/0</span>

      <button onclick="nextPage()">Sau</button>
      <button onclick="lastPage()">Cuối</button>
    </div>
  </div>
</main>

<script>
let loggerList = [];
let pivotColumns = [];
let pivotRows = [];
let currentPage = 1;
let autoPageSize = 15;

function initDatePickers() {
  flatpickr("#from", {
    enableTime: true,
    enableSeconds: true,
    time_24hr: true,
    dateFormat: "Y-m-d H:i:S",
    locale: "vn"
  });

  flatpickr("#to", {
    enableTime: true,
    enableSeconds: true,
    time_24hr: true,
    dateFormat: "Y-m-d H:i:S",
    locale: "vn"
  });
}

function calculateAutoPageSize() {
  const wrap = document.querySelector(".history-table-wrap");

  if (!wrap) return 15;

  const availableHeight = wrap.clientHeight;
  const headerHeight = 58;
  const rowHeight = 30;

  const rows = Math.floor((availableHeight - headerHeight) / rowHeight);

  return Math.max(rows, 5);
}

function getPageSize() {
  if (pageSize.value === "auto") {
    autoPageSize = calculateAutoPageSize();
    return autoPageSize;
  }

  return Number(pageSize.value || 15);
}

function toggleDropdown(id) {
  document.querySelectorAll(".multi-select").forEach(el => {
    if (el.id !== id) el.classList.remove("active");
  });

  document.getElementById(id).classList.toggle("active");
}

document.addEventListener("click", e => {
  if (!e.target.closest(".multi-select")) {
    document.querySelectorAll(".multi-select").forEach(el => {
      el.classList.remove("active");
    });
  }
});

async function api(url) {
  const res = await fetch(url, { cache: "no-store" });
  return res.json();
}

async function loadLoggers() {
  const json = await api("/api/logger/readings/map");

  if (!json.success) return;

  loggerList = json.data || [];

  loggerCheckList.innerHTML = loggerList.map(logger => `
    <label>
      <input type="checkbox" class="logger-check" value="${escapeHtml(logger.logger_id)}">
      ${escapeHtml(logger.name || logger.logger_id)}
      <small>(${escapeHtml(logger.logger_id)})</small>
    </label>
  `).join("");

  updateDropdownLabels();
}

function updateDropdownLabels() {
  const loggerCount = getCheckedLoggers().length;
  const tagCount = getCheckedTags().length;
  const sourceCount = getCheckedSources().length;

  document.querySelector("#loggerDropdown .multi-select-btn").textContent =
    loggerCount ? `Logger đã chọn: ${loggerCount}` : "Tất cả Logger";

  document.querySelector("#tagDropdown .multi-select-btn").textContent =
    tagCount ? `Tag đã chọn: ${tagCount}` : "Tất cả Tag";

  document.querySelector("#sourceDropdown .multi-select-btn").textContent =
    sourceCount ? `Nguồn đã chọn: ${sourceCount}` : "Tất cả Nguồn";
}

document.addEventListener("change", e => {
  if (
    e.target.classList.contains("logger-check") ||
    e.target.classList.contains("tag-check") ||
    e.target.classList.contains("source-check")
  ) {
    updateDropdownLabels();
  }
});

function getCheckedLoggers() {
  return Array.from(document.querySelectorAll(".logger-check:checked")).map(cb => cb.value);
}

function getCheckedTags() {
  return Array.from(document.querySelectorAll(".tag-check:checked")).map(cb => cb.value);
}

function getCheckedSources() {
  return Array.from(document.querySelectorAll(".source-check:checked")).map(cb => cb.value);
}

async function loadHistoryTable() {
  const params = new URLSearchParams();

  if (from.value) params.set("from", from.value);
  if (to.value) params.set("to", to.value);
  if (interval.value) params.set("interval", interval.value);
  if (limit.value) params.set("limit", limit.value);

  const loggers = getCheckedLoggers();
  const tags = getCheckedTags();
  const sources = getCheckedSources();

  if (loggers.length) params.set("logger_ids", loggers.join(","));
  if (tags.length) params.set("tag_keys", tags.join(","));
  if (sources.length) params.set("source", sources.join(","));

  const json = await api(`/api/logger/history/table?${params.toString()}`);

  if (!json.success) {
    summary.textContent = json.message || "Lỗi tải dữ liệu";
    pivotHead.innerHTML = "<tr><th>Lỗi</th></tr>";
    pivotBody.innerHTML = "<tr><td>Lỗi tải dữ liệu</td></tr>";
    return;
  }

  pivotColumns = json.columns || [];
  pivotRows = json.rows || [];
  currentPage = 1;

  summary.textContent =
    `Dòng hiển thị: ${json.total_rows || 0} | Dòng raw: ${json.total_raw_rows || 0} | Chu kỳ: ${json.filters?.interval || ""} | Mới nhất ở trên`;

  renderHeader(pivotColumns);

  requestAnimationFrame(() => {
    renderCurrentPage();
  });
}

function renderHeader(columns) {
  let row1 = `
    <tr>
      <th class="time-col" rowspan="2">Thời gian</th>
  `;

  let row2 = `<tr>`;

  columns.forEach((col, index) => {
    const groupClass = `group-${index % 6}`;

    row1 += `
      <th class="logger-head ${groupClass}" colspan="${col.tags.length}">
        ${escapeHtml(col.logger_name || col.logger_id)}
        <br>
        <small>${escapeHtml(col.logger_id)}</small>
      </th>
    `;

    col.tags.forEach(tag => {
      row2 += `
        <th class="tag-head ${groupClass}">
          ${escapeHtml(tag.tag_name || tag.tag_key)}
          <br>
          <small>${escapeHtml(tag.unit || "")}</small>
        </th>
      `;
    });
  });

  row1 += `</tr>`;
  row2 += `</tr>`;

  pivotHead.innerHTML = row1 + row2;
}

function renderCurrentPage() {
  const size = getPageSize();
  const totalPages = Math.max(1, Math.ceil(pivotRows.length / size));

  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  const start = (currentPage - 1) * size;
  const rows = pivotRows.slice(start, start + size);

  renderRows(pivotColumns, rows);

  const sizeText = pageSize.value === "auto" ? `${size} tự động` : size;

  pageInfo.textContent =
    `Trang ${currentPage}/${totalPages} - Tổng ${pivotRows.length} hàng - ${sizeText} hàng/trang`;
}

function renderRows(columns, rows) {
  if (!rows.length) {
    pivotBody.innerHTML = `
      <tr>
        <td class="time-col">Không có dữ liệu</td>
      </tr>
    `;
    return;
  }

  pivotBody.innerHTML = rows.map(row => {
    let html = `
      <tr>
        <td class="time-col">${escapeHtml(row.ts || "")}</td>
    `;

    columns.forEach((col, index) => {
      const cellGroup = `cell-group-${index % 6}`;

      col.tags.forEach(tag => {
        const cell = row[col.logger_id]?.[tag.tag_key];

        html += `
          <td class="${cell ? "value-cell" : "empty-cell"} ${cellGroup}">
            ${cell ? formatNumber(cell.value) : "--"}
          </td>
        `;
      });
    });

    html += `</tr>`;
    return html;
  }).join("");
}

function firstPage() {
  currentPage = 1;
  renderCurrentPage();
}

function prevPage() {
  currentPage -= 1;
  renderCurrentPage();
}

function nextPage() {
  currentPage += 1;
  renderCurrentPage();
}

function lastPage() {
  const size = getPageSize();
  currentPage = Math.max(1, Math.ceil(pivotRows.length / size));
  renderCurrentPage();
}

function changePageSize() {
  currentPage = 1;
  renderCurrentPage();
}

function setLastHour() {
  const now = new Date();
  const start = new Date(now.getTime() - 3600000);

  from.value = formatDateTime(start);
  to.value = formatDateTime(now);
}

function setTodayRange() {
  const now = new Date();
  const d = formatDate(now);

  from.value = `${d} 00:00:00`;
  to.value = `${d} 23:59:59`;
}

function setCurrentMonthRange() {
  const now = new Date();
  const y = now.getFullYear();
  const m = now.getMonth();
  const start = new Date(y, m, 1);
  const end = new Date(y, m + 1, 0);

  from.value = `${formatDate(start)} 00:00:00`;
  to.value = `${formatDate(end)} 23:59:59`;
}

function clearFilters() {
  from.value = "";
  to.value = "";
  interval.value = "5m";
  limit.value = "50000";
  pageSize.value = "auto";

  document.querySelectorAll(".logger-check").forEach(cb => cb.checked = false);
  document.querySelectorAll(".tag-check").forEach(cb => cb.checked = false);
  document.querySelectorAll(".source-check").forEach(cb => cb.checked = false);

  updateDropdownLabels();
  currentPage = 1;
  renderCurrentPage();
}

function formatNumber(value) {
  if (value === null || value === undefined || value === "") return "--";

  const n = Number(value);

  if (Number.isNaN(n)) return value;

  return new Intl.NumberFormat("vi-VN", {
    maximumFractionDigits: 3
  }).format(n);
}

function formatDate(date) {
  const pad = v => String(v).padStart(2, "0");

  return [
    date.getFullYear(),
    pad(date.getMonth() + 1),
    pad(date.getDate())
  ].join("-");
}

function formatDateTime(date) {
  const pad = v => String(v).padStart(2, "0");

  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

window.addEventListener("resize", () => {
  if (pageSize.value === "auto") {
    currentPage = 1;
    renderCurrentPage();
  }
});

const layoutObserver = new MutationObserver(() => {
  if (pageSize.value === "auto") {
    setTimeout(() => {
      currentPage = 1;
      renderCurrentPage();
    }, 300);
  }
});

layoutObserver.observe(document.body, {
  attributes: true,
  attributeFilter: ["class"]
});

initDatePickers();
setTodayRange();

loadLoggers().then(() => {
  updateDropdownLabels();
  loadHistoryTable();
});
</script>
</body>
</html>
