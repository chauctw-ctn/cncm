<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cấu hình KPI</title>

<link rel="stylesheet" href="/shared/layout.css">
<link rel="stylesheet" href="/kpi-config.css">

<script src="/shared/auth.js"></script>
<script src="/shared/layout.js"></script>
</head>

<body>
<script>AppLayout.initLayout("Cấu hình KPI");</script>

<main class="page-content">
  
  <div class="water-title-card">
    <div class="logger-toolbar">
      <h2 style="margin-right:auto;">CẤU HÌNH KPI HỆ THỐNG</h2>
      <button onclick="loadAll()">Tải lại dữ liệu</button>
      <button class="gray" style="font-size:12px; padding:6px 14px; margin:0;" onclick="clearForm()">+ Tạo mới KPI</button>
    </div>
  </div>

  <div class="config-grid">
    
    <div class="scada-card">
      <h3>Danh sách KPI cấu hình</h3>
      <div id="kpiList" class="kpi-items-wrap">
         <div class="muted" style="padding:10px;">Đang tải danh sách...</div>
      </div>
    </div>

    <div class="scada-card">
      <h3>Cài đặt & Đồng bộ chỉ số KPI</h3>
      
      <div class="form-scroll-container">
        <div class="form-grid-2">
          <div>
            <label>Mã KPI ID</label>
            <input id="kpi_id" placeholder="kpi_flow_main">
          </div>
          <div>
            <label>Tên hiển thị KPI</label>
            <input id="kpi_name" placeholder="Tổng lưu lượng hiện tại">
          </div>
          <div>
            <label>Phân loại nhóm KPI</label>
            <select id="kpi_type" onchange="onKpiTypeChange()">
              <option value="kpi-flow">kpi-flow: Lưu lượng nước real-time</option>
              <option value="kpi-total">kpi-total: Sản lượng tích lũy TotalIndex</option>
            </select>
          </div>
          <div>
            <label>Ngưỡng cao nhất (Max gauge)</label>
            <input id="max_value" type="number" placeholder="Ví dụ: 5000">
          </div>
          <div style="grid-column: span 2;">
            <label>Trạng thái đồng bộ</label>
            <select id="enabled">
              <option value="1">Kích hoạt hoạt động (Active)</option>
              <option value="0">Tạm ngưng liên kết (Disable)</option>
            </select>
          </div>
        </div>

        <h4>Chọn chu kỳ chỉ số hiển thị tích hợp</h4>
        <div class="check-panel">
          <label><input type="checkbox" class="metric-check" value="current" checked> Số liệu tức thời (Hiện tại)</label>
          <label><input type="checkbox" class="metric-check" value="today" checked> Tổng ngày hiện tại (Hôm nay)</label>
          <label><input type="checkbox" class="metric-check" value="yesterday" checked> Tổng ngày hôm trước (Hôm qua)</label>
          <label><input type="checkbox" class="metric-check" value="this_month" checked> Tổng lũy kế tháng này (Tháng hiện tại)</label>
          <label><input type="checkbox" class="metric-check" value="last_month" checked> Tổng lũy kế tháng trước (Tháng qua)</label>
        </div>

        <h4>Liên kết danh sách Logger Trạm</h4>
        <div style="display:flex; gap:6px; margin-bottom:4px;">
           <button class="gray" onclick="checkAllLoggers(true)">Chọn tất cả</button>
           <button class="gray" onclick="checkAllLoggers(false)">Bỏ chọn toàn bộ</button>
        </div>
        <div id="loggerCheckList" class="check-panel" style="max-height: 160px;">
           <div class="muted" style="padding:4px;">Đang tải danh mục logger...</div>
        </div>

        <div class="card-actions" style="margin-top:14px; display:flex; gap:6px;">
          <button onclick="saveKpi()">Lưu cấu hình KPI</button>
          <button class="danger" onclick="deleteKpi()">Xoá KPI</button>
        </div>

        <h3 style="margin-top:16px; border:none; padding:0;">Xem trước giá trị KPI (Preview Panel)</h3>
        <button style="margin-bottom:6px; background:#64748b;" onclick="previewKpi()">Truy vấn giá trị tức thời</button>
        <pre id="output">Chưa nạp bản tin truy vấn</pre>
      </div>

    </div>
  </div>
</main>

<script>
let kpiConfigs = [];
let loggers = [];
let selectedKpiId = null;

function show(data) {
  output.textContent = JSON.stringify(data, null, 2);
}

async function api(url, options = {}) {
  const res = await fetch(url, { cache: "no-store", ...options });
  const text = await res.text();
  try {
    const json = JSON.parse(text);
    show(json);
    return json;
  } catch {
    const json = { success: false, message: "API không trả JSON", url, preview: text.slice(0, 200) };
    show(json);
    return json;
  }
}

async function loadAll() {
  await Promise.all([
    loadLoggers(),
    loadKpis()
  ]);
}

async function loadLoggers() {
  const json = await api("/api/logger/readings/map");
  if (!json.success) return;

  loggers = json.data || [];
  loggerCheckList.innerHTML = loggers.map(logger => `
    <label>
      <input type="checkbox" class="logger-check" value="${escapeHtml(logger.logger_id)}">
      <span><b>${escapeHtml(logger.name || logger.logger_id)}</b> <small style="color:var(--water-muted);">(${escapeHtml(logger.logger_id)})</small></span>
    </label>
  `).join("");
}

async function loadKpis() {
  const json = await api("/api/logger/kpis");
  if (!json.success) return;

  kpiConfigs = json.data || [];
  renderKpiList();
}

function renderKpiList() {
  if (!kpiConfigs.length) {
    kpiList.innerHTML = "<div class='muted' style='padding:10px;'><i>Chưa có KPI nào được cấu hình</i></div>";
    return;
  }

  kpiList.innerHTML = kpiConfigs.map(kpi => `
    <div class="kpi-item ${selectedKpiId === kpi.kpi_id ? "active" : ""}" onclick="selectKpi('${escapeJs(kpi.kpi_id)}')">
      <div style="font-weight:700; font-size:13px; color:var(--water-text);">${escapeHtml(kpi.name || kpi.kpi_id)}</div>
      <div class="logger-meta" style="color:var(--primary-blue); font-weight:600; margin-top:2px;">Mã: ${escapeHtml(kpi.kpi_id)} &bull; ${escapeHtml(kpi.kpi_type)}</div>
      <div class="logger-meta" style="color:#94a3b8;">Số trạm liên kết: ${(kpi.logger_ids || []).length} trạm</div>
    </div>
  `).join("");
}

function selectKpi(kpiId) {
  selectedKpiId = kpiId;
  const kpi = kpiConfigs.find(x => x.kpi_id === kpiId);
  if (!kpi) return;

  kpi_id.value = kpi.kpi_id;
  kpi_id.readOnly = true;
  kpi_name.value = kpi.name || "";
  kpi_type.value = kpi.kpi_type || "kpi-flow";
  max_value.value = kpi.max_value ?? "";
  enabled.value = String(kpi.enabled ?? 1);

  const metrics = kpi.kpi_metrics || [];
  document.querySelectorAll(".metric-check").forEach(cb => {
    cb.checked = metrics.length ? metrics.includes(cb.value) : true;
  });

  const loggerSet = new Set(kpi.logger_ids || []);
  document.querySelectorAll(".logger-check").forEach(cb => {
    cb.checked = loggerSet.has(cb.value);
  });

  renderKpiList();
}

function clearForm() {
  selectedKpiId = null;
  kpi_id.value = "";
  kpi_id.readOnly = false;
  kpi_name.value = "";
  kpi_type.value = "kpi-flow";
  max_value.value = "";
  enabled.value = "1";

  document.querySelectorAll(".metric-check").forEach(cb => cb.checked = true);
  document.querySelectorAll(".logger-check").forEach(cb => cb.checked = false);
  renderKpiList();
}

function onKpiTypeChange() {
  if (!kpi_id.value) {
    if (kpi_type.value === "kpi-flow") {
      kpi_id.value = "kpi_flow_main";
      kpi_name.value = "Tổng lưu lượng hiện tại";
      max_value.value = "5000";
    } else {
      kpi_id.value = "kpi_total_main";
      kpi_name.value = "Tổng sản lượng ngày/tháng";
      max_value.value = "100000";
    }
  }
}

function getCheckedLoggers() {
  return Array.from(document.querySelectorAll(".logger-check:checked")).map(cb => cb.value);
}

function getCheckedMetrics() {
  return Array.from(document.querySelectorAll(".metric-check:checked")).map(cb => cb.value);
}

function checkAllLoggers(value) {
  document.querySelectorAll(".logger-check").forEach(cb => cb.checked = value);
}

async function saveKpi() {
  const body = {
    kpi_id: kpi_id.value.trim(),
    name: kpi_name.value.trim(),
    kpi_type: kpi_type.value,
    logger_ids: getCheckedLoggers(),
    kpi_metrics: getCheckedMetrics(),
    max_value: max_value.value ? Number(max_value.value) : null,
    enabled: Number(enabled.value)
  };

  if (!body.kpi_id) { alert("Chưa nhập KPI ID"); return; }
  if (!body.logger_ids.length) { alert("Vui lòng tích chọn tối thiểu một logger trạm liên kết"); return; }

  const method = selectedKpiId ? "PUT" : "POST";
  const url = selectedKpiId ? `/api/logger/kpis/${encodeURIComponent(selectedKpiId)}` : "/api/logger/kpis";

  const json = await api(url, {
    method,
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(body)
  });

  if (json.success) {
    await loadKpis();
    selectKpi(body.kpi_id);
  }
}

async function deleteKpi() {
  const id = selectedKpiId || kpi_id.value.trim();
  if (!id) { alert("Chưa chọn mục mục KPI để xóa"); return; }
  if (!confirm(`Xác nhận xóa hoàn toàn mục chỉ số KPI cấu hình ${id}?`)) return;

  const json = await api(`/api/logger/kpis/${encodeURIComponent(id)}`, { method: "DELETE" });
  if (json.success) {
    clearForm();
    await loadKpis();
  }
}

async function previewKpi() {
  const id = selectedKpiId || kpi_id.value.trim();
  if (!id) { alert("Vui lòng lựa chọn một mục chỉ số KPI từ danh sách bên trái để chạy preview"); return; }
  await api(`/api/logger/kpis/${encodeURIComponent(id)}/value`);
}

function escapeHtml(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}

function escapeJs(value) {
  return String(value ?? "").replaceAll("\\", "\\\\").replaceAll("'", "\\'");
}

loadAll();
</script>
</body>
</html>
