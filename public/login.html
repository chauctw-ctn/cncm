<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Đăng nhập</title>
  <script src="/shared/auth.js"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e40af);
    }

    .login-box {
      width: 380px;
      background: white;
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    h2 {
      margin-top: 0;
      text-align: center;
      color: #0f172a;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #cbd5e1;
      border-radius: 8px;
      box-sizing: border-box;
    }

    button {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    .error {
      color: #dc2626;
      text-align: center;
      margin-top: 10px;
    }

    .hint {
      text-align: center;
      color: #64748b;
      font-size: 13px;
      margin-top: 12px;
    }
  </style>
</head>

<body>
  <div class="login-box">
    <h2>CAWACO Dashboard</h2>

    <input id="username" placeholder="Tên đăng nhập" value="admin">
    <input id="password" type="password" placeholder="Mật khẩu" value="admin123">

    <button onclick="handleLogin()">Đăng nhập</button>

    <div id="error" class="error"></div>

    <div class="hint">
      Mặc định: admin / admin123
    </div>
  </div>

  <script>
    function handleLogin() {
      const user = Auth.login(username.value.trim(), password.value);

      if (!user) {
        error.textContent = "Sai tài khoản hoặc mật khẩu";
        return;
      }

      location.href = "/index.html";
    }

    document.addEventListener("keydown", e => {
      if (e.key === "Enter") handleLogin();
    });
  </script>
</body>
</html>
