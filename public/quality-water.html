<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chất lượng nước</title>

<link rel="stylesheet" href="/shared/layout.css">
<link rel="stylesheet" href="/quality-water.css">

<script src="/shared/auth.js"></script>
<script src="/shared/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
</head>

<body>
<script>AppLayout.initLayout("Chất lượng nước");</script>

<main class="page-content water-page">

    <div class="water-title">
      <h2>CHẤT LƯỢNG NƯỚC SCADA</h2>
    </div>

    <div class="water-kpi-grid" id="kpiBar">
      <div class="water-kpi-card">
        <span>Tổng trạm SCADA</span>
        <h2 id="kpiTotal">--</h2>
      </div>
      <div class="water-kpi-card">
        <span>Đang online</span>
        <h2 id="kpiOnline" style="color:#16a34a !important">--</h2>
      </div>
      <div class="water-kpi-card">
        <span>Offline / mất kết nối</span>
        <h2 id="kpiOffline" style="color:#dc2626 !important">--</h2>
      </div>
      <div class="water-kpi-card">
        <span>Thông số vượt ngưỡng</span>
        <h2 id="kpiAlert" style="color:#ea580c !important">--</h2>
      </div>
    </div>

    <div class="water-card water-filter-card">
      <div class="water-filter-grid">

        <div>
          <label>Trạm SCADA</label>
          <select id="stationFilter">
            <option value="">Tất cả</option>
          </select>
        </div>

        <div>
          <label>Thông số</label>
          <select id="parameterFilter">
            <option value="">Tất cả</option>
            <option value="pH">pH</option>
            <option value="TDS">TDS</option>
            <option value="amino">Amino</option>
            <option value="nitrat">Nitrat</option>
          </select>
        </div>

        <div>
          <label>Trạng thái</label>
          <select id="statusFilter">
            <option value="">Tất cả</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
          </select>
        </div>

        <div>
          <label>Tự động cập nhật</label>
          <select id="refreshInterval">
            <option value="0">Tắt</option>
            <option value="10">10 giây</option>
            <option value="30" selected>30 giây</option>
            <option value="60">60 giây</option>
          </select>
        </div>

      </div>
    </div>

    <div class="water-card">
      <div class="water-summary" id="summary">Đang tải dữ liệu...</div>
      <div class="water-quality-grid" id="qualityGrid"></div>
    </div>

</main>

<div id="chartModal" class="water-modal">
  <div class="water-modal-content water-modal-wide">
    <div class="water-modal-header">
      <h3 id="modalStationName">Tên trạm</h3>
      <span class="water-modal-close" onclick="closeChartModal()">&times;</span>
    </div>
    <div class="water-modal-body">
      <div class="chart-triple-grid">
        <div class="chart-triple-item">
          <div class="chart-triple-title" id="chartTitle0"></div>
          <div class="chart-container-small"><canvas id="chart0"></canvas></div>
        </div>
        <div class="chart-triple-item">
          <div class="chart-triple-title" id="chartTitle1"></div>
          <div class="chart-container-small"><canvas id="chart1"></canvas></div>
        </div>
        <div class="chart-triple-item">
          <div class="chart-triple-title" id="chartTitle2"></div>
          <div class="chart-container-small"><canvas id="chart2"></canvas></div>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
/* ── 3-chart modal layout ── */
.water-modal-wide { max-width: 960px !important; width: 95% !important; }

.chart-triple-grid {
  display: grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap: 12px;
}

.chart-triple-item {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 8px;
  padding: 10px 12px 12px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.chart-triple-title {
  font-size: 12px;
  font-weight: 700;
  color: #475569;
  text-align: center;
  letter-spacing: 0.3px;
}

.chart-container-small {
  position: relative;
  height: 220px;
  width: 100%;
}

.chart-container-small canvas {
  width: 100% !important;
  height: 100% !important;
}

@media (max-width: 700px) {
  .chart-triple-grid { grid-template-columns: 1fr; }
  .chart-container-small { height: 180px; }
}
</style>

<script>
// ── Hằng số ────────────────────────────────────────────────────────────────
const QUALITY_TAGS = ["pH", "TDS", "amino", "nitrat"];
const ONLINE_THRESHOLD_MS = 30 * 60 * 1000;

const PARAM_CONFIGS = {
  pH:     { label: 'pH',           color: '#2563eb' },
  TDS:    { label: 'TDS (mg/L)',   color: '#16a34a' },
  amino:  { label: 'Amino (mg/L)', color: '#ea580c' },
  nitrat: { label: 'Nitrat (mg/L)',color: '#dc2626' }
};

// ── State ──────────────────────────────────────────────────────────────────
let cachedStations = [];
let refreshTimer   = null;
// activeCharts = [] được khai báo cùng openChartModal bên dưới

// ── Helpers ────────────────────────────────────────────────────────────────
function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

function formatNumber(value, decimals = 2) {
  if (value === null || value === undefined || value === "") return "--";
  const n = Number(value);
  if (isNaN(n)) return String(value);
  return new Intl.NumberFormat("vi-VN", { maximumFractionDigits: decimals }).format(n);
}

function isLoggerOnline(station) {
  if (Number(station.enabled) === 0) return false;
  const tags = Object.values(station.tags || {});
  if (!tags.length) return false;
  const latestTs = tags.map(t => t.data_ts).filter(Boolean).sort().pop();
  if (!latestTs) return false;
  const ts = new Date(String(latestTs).replace(" ", "T"));
  if (isNaN(ts.getTime())) return false;
  return Date.now() - ts.getTime() <= ONLINE_THRESHOLD_MS;
}

// ── Phân loại chất lượng ──────────────────────────────────────────────────
function getQualityClass(tagKey, value) {
  const v = Number(value);
  if (isNaN(v)) return "";
  switch (tagKey) {
    case "pH":     return (v < 6.5 || v > 8.5) ? "status-bad"  : "status-good";
    case "TDS":    return v > 1000 ? "status-bad"  : v > 500 ? "status-warn" : "status-good";
    case "amino":  return v > 1    ? "status-warn" : "status-good";
    case "nitrat": return v > 50   ? "status-bad"  : v > 25  ? "status-warn" : "status-good";
    default:       return "";
  }
}

function hasAlert(station) {
  return QUALITY_TAGS.some(k => {
    const tag = (station.tags || {})[k];
    if (!tag) return false;
    const cls = getQualityClass(k, tag.value);
    return cls !== "status-good" && cls !== "";
  });
}

// ── Fetch API ──────────────────────────────────────────────────────────────
async function api(url) {
  const res  = await fetch(url, { cache: "no-store" });
  const text = await res.text();
  try { return JSON.parse(text); }
  catch { return { success: false, message: "API không trả JSON" }; }
}

async function fetchMapData() {
  const json = await api("/api/logger/readings/map");
  if (!json.success) throw new Error(json.message || "API error");
  cachedStations = (json.data || []).filter(
    s => s.source === "scada" || String(s.logger_id || "").startsWith("scada_")
  );
}

// ── KPI bar ────────────────────────────────────────────────────────────────
function updateKpiBar(stations) {
  const total   = stations.length;
  const online  = stations.filter(s => isLoggerOnline(s)).length;
  const offline = total - online;
  const alert   = stations.filter(s => hasAlert(s)).length;

  document.getElementById("kpiTotal").textContent   = total;
  document.getElementById("kpiOnline").textContent  = online;
  document.getElementById("kpiOffline").textContent = offline;
  document.getElementById("kpiAlert").textContent   = alert;
}

// ── Station filter dropdown ────────────────────────────────────────────────
function populateStationFilter() {
  const select  = document.getElementById("stationFilter");
  const current = select.value;
  select.innerHTML =
    `<option value="">Tất cả</option>` +
    cachedStations.map(s =>
      `<option value="${escapeHtml(s.logger_id)}"` +
      (s.logger_id === current ? " selected" : "") +
      `>${escapeHtml(s.name || s.logger_id)}</option>`
    ).join("");
}

// ── Load + render ──────────────────────────────────────────────────────────
async function loadQualityData() {
  try {
    await fetchMapData();
    populateStationFilter();
    updateKpiBar(cachedStations);

    const stationId = document.getElementById("stationFilter").value;
    const parameter = document.getElementById("parameterFilter").value;
    const status    = document.getElementById("statusFilter").value;

    let stations = [...cachedStations];
    if (stationId) stations = stations.filter(s => s.logger_id === stationId);
    if (status === "online")  stations = stations.filter(s =>  isLoggerOnline(s));
    if (status === "offline") stations = stations.filter(s => !isLoggerOnline(s));

    renderCards(stations, parameter);
  } catch (err) {
    console.error(err);
    document.getElementById("summary").textContent = "Không tải được dữ liệu";
  }
}

// ── Render cards ───────────────────────────────────────────────────────────
function renderCards(stations, parameterFilter) {
  const grid    = document.getElementById("qualityGrid");
  const summary = document.getElementById("summary");

  const visible = stations.filter(s => QUALITY_TAGS.some(k => s.tags && k in s.tags));

  if (visible.length === 0) {
    grid.innerHTML      = `<div class="water-empty">Không có dữ liệu chất lượng nước</div>`;
    summary.textContent = "0 trạm";
    return;
  }

  summary.textContent = `Hiển thị ${visible.length} / ${cachedStations.length} trạm SCADA (Click vào card để xem biểu đồ)`;

  grid.innerHTML = visible.map(station => {
    const tags   = station.tags || {};
    const online = isLoggerOnline(station);

    const keys = QUALITY_TAGS.filter(k => k in tags && (!parameterFilter || k === parameterFilter));
    if (keys.length === 0) return "";

    const latestTs = keys.map(k => tags[k].data_ts || "").filter(Boolean).sort().at(-1) || "";

    const badge = online
      ? `<span class="water-badge online">● Online</span>`
      : `<span class="water-badge offline">● Offline</span>`;

    const rows = keys.map(k => {
      const tag = tags[k];
      const cls = getQualityClass(k, tag.value);
      return `
        <div class="water-quality-item">
          <div class="water-quality-label">${escapeHtml(tag.tag_name || k)}</div>
          <div class="water-quality-value ${escapeHtml(cls)}">${formatNumber(tag.value)}</div>
          <div class="water-quality-unit">${escapeHtml(tag.unit || "")}</div>
        </div>`;
    }).join("");

    return `
      <div class="water-quality-card${online ? "" : " offline"}" style="cursor:pointer;" onclick="openChartModal('${escapeHtml(station.logger_id)}')">
        <div class="water-station-header">
          <div class="water-station-name">${escapeHtml(station.name || station.logger_id)}</div>
          ${badge}
        </div>
        <div class="water-station-time">${escapeHtml(latestTs)}</div>
        <div class="water-quality-values">${rows}</div>
      </div>`;
  }).join("");
}

// ── Modal & 3 Charts side-by-side ─────────────────────────────────────────
// Chart 0 = pH | Chart 1 = TDS | Chart 2 = Amino + Nitrat (cùng đơn vị mg/L)
const CHART_GROUPS = [
  { keys: ["pH"],            title: "pH" },
  { keys: ["TDS"],           title: "TDS (mg/L)" },
  { keys: ["amino","nitrat"],title: "Amino & Nitrat (mg/L)" }
];

let activeCharts = []; // lưu 3 Chart instance

function openChartModal(loggerId) {
  const station = cachedStations.find(s => s.logger_id === loggerId);
  if (!station) return;

  document.getElementById("modalStationName").textContent =
    `XU HƯỚNG CHẤT LƯỢNG NƯỚC - ${station.name || station.logger_id}`;

  document.getElementById("chartModal").style.display = "flex";

  // Hủy 3 chart cũ
  activeCharts.forEach(c => c && c.destroy());
  activeCharts = [];

  const mockTimestamps = ["10:00", "11:00", "12:00", "13:00", "14:00", "15:00"];

  setTimeout(() => {
    CHART_GROUPS.forEach((group, idx) => {
      // Tiêu đề nhỏ trên mỗi chart
      document.getElementById("chartTitle" + idx).textContent = group.title;

      const datasets = [];
      group.keys.forEach(k => {
        if (!station.tags || !station.tags[k]) return;
        const currentVal = Number(station.tags[k].value) || 0;
        const dataValues = mockTimestamps.map((_, i) => {
          if (i === mockTimestamps.length - 1) return currentVal;
          const factor = (Math.random() - 0.5) * currentVal * 0.1;
          return Number((currentVal + factor).toFixed(2));
        });
        datasets.push({
          label:           PARAM_CONFIGS[k].label,
          data:            dataValues,
          borderColor:     PARAM_CONFIGS[k].color,
          backgroundColor: PARAM_CONFIGS[k].color + "1A",
          borderWidth:     2,
          tension:         0.3,
          pointRadius:     3,
          fill:            false
        });
      });

      if (datasets.length === 0) { activeCharts.push(null); return; }

      const ctx = document.getElementById("chart" + idx).getContext("2d");
      const chart = new Chart(ctx, {
        type: "line",
        data: { labels: mockTimestamps, datasets },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: {
            legend: { position: "top", labels: { boxWidth: 10, font: { size: 11 } } },
            tooltip: { mode: "index", intersect: false }
          },
          scales: {
            x: { grid: { display: false }, ticks: { font: { size: 10 } } },
            y: { beginAtZero: false, grid: { color: "#e2e8f0" }, ticks: { font: { size: 10 } } }
          }
        }
      });
      activeCharts.push(chart);
    });
  }, 50);
}

function closeChartModal() {
  document.getElementById("chartModal").style.display = "none";
  activeCharts.forEach(c => c && c.destroy());
  activeCharts = [];
}

// Click ra ngoài modal thì đóng
window.addEventListener("click", function(event) {
  const modal = document.getElementById("chartModal");
  if (event.target === modal) closeChartModal();
});

// ── Auto refresh ───────────────────────────────────────────────────────────
function setupAutoRefresh() {
  if (refreshTimer) { clearInterval(refreshTimer); refreshTimer = null; }
  const sec = Number(document.getElementById("refreshInterval").value);
  if (sec > 0) refreshTimer = setInterval(loadQualityData, sec * 1000);
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById("stationFilter").addEventListener("change", loadQualityData);
document.getElementById("parameterFilter").addEventListener("change", loadQualityData);
document.getElementById("statusFilter").addEventListener("change", loadQualityData);
document.getElementById("refreshInterval").addEventListener("change", setupAutoRefresh);

// ── Init ───────────────────────────────────────────────────────────────────
loadQualityData();
setupAutoRefresh();
</script>

</body>
</html>
