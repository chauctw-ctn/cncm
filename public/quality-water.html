<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chất lượng nước</title>

<link rel="stylesheet" href="/shared/layout.css">
<link rel="stylesheet" href="/quality-water.css">

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/vn.js"></script>

<script src="/shared/auth.js"></script>
<script src="/shared/layout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0/dist/chart.umd.min.js"></script>
</head>

<body>
<script>AppLayout.initLayout("Chất lượng nước");</script>
<main class="page-content">
    <div class="water-title">
      <h2>DỮ LIỆU SCADA CHẤT LƯỢNG NƯỚC</h2>
    </div>

    <div class="kpi-row-grid" id="kpiContainer">
         <div class="water-empty">Đang tải dữ liệu KPI trạm...</div>
    </div>

    <div class="water-global-filter-bar">
        <div class="global-filter-group">
            <label>Từ thời gian:</label>
            <input id="filterFrom" type="text" readonly>
        </div>
        <div class="global-filter-group">
            <label>Đến thời gian:</label>
            <input id="filterTo" type="text" readonly>
        </div>
        <div class="global-filter-group">
            <label>Chu kỳ:</label>
            <select id="filterInterval">
                <option value="5m" selected>5 phút</option>
                <option value="10m">10 phút</option>
                <option value="15m">15 phút</option>
                <option value="30m">30 phút</option>
                <option value="1h">1 giờ</option>
                <option value="1d">1 ngày</option>
            </select>
        </div>
        <button class="global-filter-btn" onclick="applyGlobalFilter()">Xem kết quả</button>
    </div>

    <div class="chart-row-grid" id="chartContainer">
         <div class="water-empty">Đang tải dữ liệu biểu đồ...</div>
    </div>
</main>

<script>
// ── Hằng số cấu hình định nghĩa tông màu đồng bộ ──────────────────────────
const QUALITY_TAGS = ["pH", "TDS", "amino", "nitrat"];
const ONLINE_THRESHOLD_MS = 30 * 60 * 1000;

const PARAM_CONFIGS = {
  pH:     { label: 'pH',           color: '#2563eb' }, // Xanh dương
  TDS:    { label: 'TDS (mg/L)',   color: '#10b981' }, // Xanh Emerald
  amino:  { label: 'Amino (mg/L)', color: '#f59e0b' }, // Cam hổ phách
  nitrat: { label: 'Nitrat (mg/L)',color: '#ef4444' }  // Đỏ hồng
};

// ── State lưu trữ ──────────────────────────────────────────────────────────
let cachedStations = [];
let activeCharts   = {}; 
let isPickerInitialized = false;

// ── Helpers ────────────────────────────────────────────────────────────────
function escapeHtml(value) {
  return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;");
}

function formatNumber(value, decimals = 2) {
  if (value === null || value === undefined || value === "") return "--";
  const n = Number(value);
  if (isNaN(n)) return String(value);
  return new Intl.NumberFormat("vi-VN", { maximumFractionDigits: decimals }).format(n);
}

function isLoggerOnline(station) {
  if (Number(station.enabled) === 0) return false;
  const tags = Object.values(station.tags || {});
  if (!tags.length) return false;
  const latestTs = tags.map(t => t.data_ts).filter(Boolean).sort().pop();
  if (!latestTs) return false;
  const ts = new Date(String(latestTs).replace(" ", "T"));
  return !isNaN(ts.getTime()) && (Date.now() - ts.getTime() <= ONLINE_THRESHOLD_MS);
}

function getQualityClass(tagKey, value) {
  const v = Number(value);
  if (isNaN(v)) return "";
  switch (tagKey) {
    case "pH":     return (v < 6.5 || v > 8.5) ? "status-bad"  : "status-good";
    case "TDS":    return v > 1000 ? "status-bad"  : v > 500 ? "status-warn" : "status-good";
    case "amino":  return v > 2.0  ? "status-bad"  : v > 1.0 ? "status-warn" : "status-good";
    case "nitrat": return v > 50   ? "status-bad"  : v > 25  ? "status-warn" : "status-good";
    default:       return "";
  }
}

function formatDate(date) {
  const pad = v => String(v).padStart(2, "0");
  return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())} ${pad(date.getHours())}:${pad(date.getMinutes())}:${pad(date.getSeconds())}`;
}

async function api(url) {
  const res  = await fetch(url, { cache: "no-store" });
  try { return await res.json(); } catch { return { success: false }; }
}

// ── Điều phối trang chính ──────────────────────────────────────────────────
async function loadQualityData() {
  try {
    const jsonMap = await api("/api/logger/readings/map");
    if (!jsonMap.success) throw new Error();

    cachedStations = (jsonMap.data || []).filter(
      s => s.source === "scada" || String(s.logger_id || "").startsWith("scada_")
    );

    const visible = cachedStations.filter(s => QUALITY_TAGS.some(k => s.tags && k in s.tags));
    const targetStations = visible.slice(0, 3);

    // 1. Khởi tạo mốc thời gian mặc định (60 phút)
    if (!isPickerInitialized) {
       initGlobalDatePickers();
    }

    // 2. Dựng khung độc lập cho KPI (Hàng trên) và Biểu đồ (Hàng dưới)
    renderLayoutFrames(targetStations);

    // 3. Tải đồ thị lịch sử
    if (targetStations.length > 0) {
      await fetchAndDrawAllCharts(targetStations);
    }

  } catch (err) {
    document.getElementById("kpiContainer").innerHTML = `<div class="water-empty">Không kết nối được dữ liệu SCADA.</div>`;
    document.getElementById("chartContainer").innerHTML = ``;
  }
}

function initGlobalDatePickers() {
  const now = new Date();
  const sixtyMinutesAgo = new Date(now.getTime() - 60 * 60 *4* 1000); // 60 phút gần nhất

  const flatpickrConfig = { enableTime: true, time_24hr: true, dateFormat: "Y-m-d H:i:S", locale: "vn" };
  flatpickr("#filterFrom", { ...flatpickrConfig, defaultDate: sixtyMinutesAgo });
  flatpickr("#filterTo", { ...flatpickrConfig, defaultDate: now });
  isPickerInitialized = true;
}

// ── Tách khung Layout vào đúng vị trí chỉ định ──────────────────────────────
function renderLayoutFrames(targetStations) {
  const kpiBox = document.getElementById("kpiContainer");
  const chartBox = document.getElementById("chartContainer");
  if (!kpiBox || !chartBox) return;

  if (targetStations.length === 0) {
    kpiBox.innerHTML = `<div class="water-empty">Không tìm thấy dữ liệu trạm SCADA hợp lệ</div>`;
    chartBox.innerHTML = ``;
    return;
  }

  // Đổ dữ liệu vào hàng KPI (NẰM TRÊN BỘ LỌC) - Tối ưu Grid 2x2 động đồng bộ màu chỉ số
  kpiBox.innerHTML = targetStations.map(station => {
    const tags   = station.tags || {};
    const online = isLoggerOnline(station);
    const keys   = QUALITY_TAGS.filter(k => k in tags);
    const latestTs = keys.map(k => tags[k].data_ts || "").filter(Boolean).sort().at(-1) || "";
    const badge = online ? `<span class="water-badge online">● Online</span>` : `<span class="water-badge offline">● Offline</span>`;

    const rows = keys.map(k => {
      const tag = tags[k];
      const valueCls = getQualityClass(k, tag.value); 
      
      let statusTxt = "BÌNH THƯỜNG";
      if (valueCls === "status-warn") statusTxt = "CẢNH BÁO";
      if (valueCls === "status-bad") statusTxt = "VƯỢT NGƯỠNG";

      // Tạo class riêng biệt theo tên biến để ăn màu CSS (param-ph, param-tds,...)
      const paramSpecificCls = `param-${String(k).toLowerCase()}`;

      return `
        <div class="water-quality-item ${paramSpecificCls} ${valueCls}">
          <div class="water-item-top-row">
            <div class="water-quality-label">${escapeHtml(tag.tag_name || k)}</div>
            <div class="water-quality-status-text">${statusTxt}</div>
          </div>
          <div class="water-quality-value-group">
             <span class="water-quality-value">${formatNumber(tag.value)}</span>
             <span class="water-quality-unit">${escapeHtml(tag.unit || "")}</span>
          </div>
        </div>`;
    }).join("");

    return `
      <div class="water-quality-card ${online ? "" : "offline"}">
        <div class="water-station-header">
          <div class="water-station-name">${escapeHtml(station.name || station.logger_id)}</div>
          ${badge}
        </div>
        <div class="water-station-time">Cập nhật: ${escapeHtml(latestTs)}</div>
        <div class="water-quality-values">${rows}</div>
      </div>`;
  }).join("");

  // Đổ dữ liệu vào hàng Chart xu hướng (NẰM DƯỚI BỘ LỌC)
  chartBox.innerHTML = targetStations.map(station => `
    <div class="chart-item-box" id="box-${escapeHtml(station.logger_id)}">
       <canvas id="main-chart-${escapeHtml(station.logger_id)}"></canvas>
    </div>
  `).join("");
}

// ── Kéo dữ liệu lịch sử và vẽ đồ thị ─────────────────────────────────────────
async function fetchAndDrawAllCharts(targetStations) {
  const fromVal = document.getElementById("filterFrom").value;
  const toVal = document.getElementById("filterTo").value;
  const intervalVal = document.getElementById("filterInterval").value;

  const params = new URLSearchParams({
    from: fromVal, to: toVal, interval: intervalVal,
    logger_ids: targetStations.map(s => s.logger_id).join(","),
    tag_keys: QUALITY_TAGS.join(","), limit: "10000"
  });

  const jsonHistory = await api(`/api/logger/history/table?${params.toString()}`);
  
  targetStations.forEach(station => {
    const box = document.getElementById(`box-${station.logger_id}`);
    if (!box) return;

    box.innerHTML = `<canvas id="main-chart-${escapeHtml(station.logger_id)}"></canvas>`;

    if (!jsonHistory.success || !jsonHistory.rows || jsonHistory.rows.length === 0) {
      box.innerHTML = `<div style="font-size:11px; text-align:center; padding-top:45px; color:#94a3b8;">Không có dữ liệu lịch sử</div>`;
      return;
    }

    const sortedRows = [...jsonHistory.rows].reverse();
    const labels = sortedRows.map(r => {
      const tsStr = r.ts || "";
      const diffMs = new Date(toVal.replace(" ", "T")) - new Date(fromVal.replace(" ", "T"));
      return diffMs <= 24 * 60 * 60 * 1000 ? tsStr.substring(11, 16) : tsStr.substring(5, 16);
    });

    const datasets = [];
    QUALITY_TAGS.forEach(k => {
      const dataValues = sortedRows.map(r => {
        const cell = r[station.logger_id]?.[k];
        return cell !== undefined && cell !== null ? Number(cell.value) : null;
      });
      if (dataValues.every(v => v === null)) return;

      datasets.push({
        label: PARAM_CONFIGS[k].label, data: dataValues,
        borderColor: PARAM_CONFIGS[k].color, backgroundColor: PARAM_CONFIGS[k].color + "10",
        borderWidth: 1.6, tension: 0.15,
        pointRadius: sortedRows.length > 60 ? 0 : 1.25, pointHoverRadius: 1.25,
        fill: false, spanGaps: true
      });
    });

    renderChartObject(station, labels, datasets);
  });
}

function renderChartObject(station, labels, datasets) {
  const canvasId = `main-chart-${station.logger_id}`;
  const ctx = document.getElementById(canvasId)?.getContext("2d");
  if (!ctx) return;

  if (activeCharts[station.logger_id]) activeCharts[station.logger_id].destroy();

  activeCharts[station.logger_id] = new Chart(ctx, {
    type: "line",
    data: { labels, datasets },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        title: { display: true, text: `Xu hướng: ${station.name || station.logger_id}`, font: { size: 12, weight: 'bold' } },
        legend: { position: "bottom", labels: { boxWidth: 6, font: { size: 9 }, padding: 4 } },
        tooltip: { mode: "index", intersect: false }
      },
      scales: {
        x: { grid: { display: false }, ticks: { font: { size: 8 }, maxTicksLimit: 5 } },
        y: { grid: { color: "#f1f5f9" }, ticks: { font: { size: 8 } } }
      }
    }
  });
}

function applyGlobalFilter() {
  const visible = cachedStations.filter(s => QUALITY_TAGS.some(k => s.tags && k in s.tags));
  const targetStations = visible.slice(0, 3);
  if (targetStations.length > 0) fetchAndDrawAllCharts(targetStations);
}

// Cập nhật Realtime định kỳ 30 giây
setInterval(async () => {
   try {
     const jsonMap = await api("/api/logger/readings/map");
     if (jsonMap.success) {
        cachedStations = (jsonMap.data || []).filter(s => s.source === "scada" || String(s.logger_id || "").startsWith("scada_"));
        const visible = cachedStations.filter(s => QUALITY_TAGS.some(k => s.tags && k in s.tags));
        renderLayoutFrames(visible.slice(0, 3));
        applyGlobalFilter();
     }
   } catch(e){}
}, 30 * 1000);

loadQualityData();
</script>
</body>
</html>
