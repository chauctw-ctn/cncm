<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>KPI</title>
  <link rel="stylesheet" href="/shared/layout.css">
  <script src="/shared/auth.js"></script>
  <script src="/shared/layout.js"></script>
</head>

<body>
<main class="page-content">
  <div class="card">
    <h2>KPI</h2>
    <button onclick="loadKpis()">Tải KPI</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>KPI ID</th>
          <th>Tên</th>
          <th>Loại</th>
          <th>Giá trị</th>
        </tr>
      </thead>
      <tbody id="kpiTable"></tbody>
    </table>
  </div>
</main>

<script>
AppLayout.initLayout("KPI");

async function loadKpis() {
  const res = await fetch("/api/logger/kpis");
  const json = await res.json();

  if (!json.success) return alert("Lỗi tải KPI");

  kpiTable.innerHTML = "";

  for (const kpi of json.data) {
    let valueText = "--";

    try {
      const valueRes = await fetch(`/api/logger/kpis/${encodeURIComponent(kpi.kpi_id)}/value`);
      const valueJson = await valueRes.json();

      if (kpi.kpi_type === "kpi-flow") {
        valueText = `${valueJson.value ?? 0} ${valueJson.unit || ""}`;
      } else {
        valueText = `
          Ngày: ${valueJson.today?.value ?? 0} ${valueJson.unit || ""}<br>
          Tháng: ${valueJson.month?.value ?? 0} ${valueJson.unit || ""}
        `;
      }
    } catch {}

    kpiTable.innerHTML += `
      <tr>
        <td>${kpi.kpi_id}</td>
        <td>${kpi.name}</td>
        <td>${kpi.kpi_type}</td>
        <td>${valueText}</td>
      </tr>
    `;
  }
}

loadKpis();
</script>
</body>
</html>
