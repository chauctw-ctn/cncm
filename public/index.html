<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>

  <link rel="stylesheet" href="/shared/layout.css">
  <script src="/shared/auth.js"></script>
  <script src="/shared/layout.js"></script>
</head>

<body>
<main class="page-content">
  <div class="card">
    <h2>Dashboard</h2>
    <p>Xin chào <b id="welcomeUser"></b></p>
  </div>

  <div class="card">
    <h3>Tổng quan hệ thống</h3>

    <button onclick="loadSummary()">Tải tổng quan</button>

    <pre id="summaryOutput">Chưa có dữ liệu</pre>
  </div>
</main>

<script>
AppLayout.initLayout("Dashboard");

const currentUser = Auth.getCurrentUser();

welcomeUser.textContent =
  currentUser.fullname || currentUser.username;

async function loadSummary() {
  try {
    const [healthRes, mapRes] = await Promise.all([
      fetch("/api/health"),
      fetch("/api/logger/readings/map")
    ]);

    const health = await healthRes.json();
    const map = await mapRes.json();

    summaryOutput.textContent = JSON.stringify({
      health,
      total_loggers: map.success ? map.data.length : 0,
      loggers: map.success ? map.data.slice(0, 10) : []
    }, null, 2);
  } catch (err) {
    summaryOutput.textContent = JSON.stringify({
      success: false,
      message: err.message
    }, null, 2);
  }
}

loadSummary();
</script>
</body>
</html>
