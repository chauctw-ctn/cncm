<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Logger Map</title>

  <link rel="stylesheet" href="/shared/layout.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <script src="/shared/auth.js"></script>
  <script src="/shared/layout.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <style>
    /* === Đảm bảo body và main tận dụng tối đa chiều cao hệ thống === */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    .page-content {
      display: flex;
      flex-direction: column;
      height: 100vh; /* Hoặc điều chỉnh theo khung layout chung của dự án */
      box-sizing: border-box;
    }

    /* === Thẻ .card co giãn thông minh, chiếm trọn phần còn lại === */
    .card-full-map {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin: 0;
      padding: 0 !important;
      overflow: hidden;
      border: 1px solid #e5e7eb;
      background: #f8fafc;
      border-radius: 0px;
    }

    /* === Khung bọc bản đồ ôm khít card === */
    .map-wrap {
      flex: 1;
      width: 100%;
      height: 100%;
      position: relative;
      overflow: hidden;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    /* === Overlay toolbar (top-left) === */
    .map-overlay-toolbar {
      position: absolute;
      top: 12px;
      left: 12px;
      z-index: 900;
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .filter-pill {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(203,213,225,0.7);
      border-radius: 8px;
      padding: 5px 9px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .filter-pill svg {
      opacity: 0.45;
      flex-shrink: 0;
    }

    .filter-pill input,
    .filter-pill select {
      background: transparent;
      border: none;
      outline: none;
      font-size: 12px;
      color: #334155;
      font-family: inherit;
      cursor: pointer;
      min-width: 0;
    }

    .filter-pill input {
      width: 130px;
    }

    .filter-pill input::placeholder {
      color: #94a3b8;
    }

    .filter-pill select {
      width: auto;
      max-width: 110px;
      color: #475569;
    }

    /* === Map type toggle (top-right) === */
    .map-type-control {
      position: absolute;
      top: 12px;
      right: 12px;
      z-index: 900;
    }

    .map-type-btn {
      width: 36px;
      height: 36px;
      border-radius: 8px;
      border: 1px solid rgba(203,213,225,0.8);
      background: rgba(255,255,255,0.72);
      color: #475569;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .map-type-btn:hover {
      background: rgba(255,255,255,0.92);
    }

    .map-type-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 44px;
      width: 190px;
      background: white;
      border: 1px solid #e2e8f0;
      border-radius: 10px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.14);
      overflow: hidden;
    }

    .map-type-menu.active {
      display: block;
    }

    .map-type-item {
      padding: 9px 12px;
      cursor: pointer;
      border-bottom: 1px solid #f1f5f9;
      font-size: 13px;
      color: #475569;
    }

    .map-type-item:last-child {
      border-bottom: none;
    }

    .map-type-item:hover,
    .map-type-item.active {
      background: #eff6ff;
      color: #1e40af;
    }

    /* === Legend (bottom-left) === */
    .map-legend {
      position: absolute;
      bottom: 28px;
      left: 12px;
      z-index: 900;
      display: flex;
      gap: 10px;
      align-items: center;
      background: rgba(255,255,255,0.72);
      border: 1px solid rgba(203,213,225,0.6);
      border-radius: 8px;
      padding: 5px 10px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      color: #475569;
    }

    .legend-dot {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* === Popup === */
    .popup {
      min-width: 280px;
      max-width: 380px;
      font-family: Arial, sans-serif;
      color: #0f172a;
    }

    .popup h3 {
      margin: 0 0 6px;
      font-size: 16px;
    }

    .popup .meta {
      color: #64748b;
      font-size: 12px;
      margin-bottom: 8px;
    }

    .popup-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      margin-top: 8px;
    }

    .popup-table th,
    .popup-table td {
      border-bottom: 1px solid #e5e7eb;
      padding: 5px;
      text-align: left;
    }

    .popup-table th {
      background: #f8fafc;
    }

    .status-online {
      color: #16a34a;
      font-weight: bold;
    }

    .status-offline {
      color: #dc2626;
      font-weight: bold;
    }

    /* === Logger label tooltip === */
    .logger-label {
      background: rgba(255,255,255,0.95);
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      color: #0f172a;
      font-size: 12px;
      font-weight: 700;
      padding: 3px 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
      white-space: nowrap;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logger-label.online {
      border-color: #16a34a;
    }

    .logger-label.offline {
      border-color: #dc2626;
      color: #dc2626;
    }
  </style>
</head>

<body>
<main class="page-content">

  <div class="card card-full-map">
    <div class="map-wrap">
      <div id="map"></div>

      <div class="map-overlay-toolbar">
        <div class="filter-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="searchText" placeholder="Tìm logger / trạm..." oninput="renderMarkers()">
        </div>

        <div class="filter-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4.03 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4.03 3 9 3s9-1.34 9-3"/></svg>
          <select id="sourceFilter" onchange="renderMarkers()">
            <option value="">Tất cả nguồn</option>
            <option value="mqtt">mqtt</option>
            <option value="scada">scada</option>
            <option value="monre">monre</option>
            <option value="tva">tva</option>
          </select>
        </div>

        <div class="filter-pill">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12.55a11 11 0 0 1 14.08 0"/><path d="M1.42 9a16 16 0 0 1 21.16 0"/><path d="M8.53 16.11a6 6 0 0 1 6.95 0"/><line x1="12" y1="20" x2="12.01" y2="20"/></svg>
          <select id="statusFilter" onchange="renderMarkers()">
            <option value="">Tất cả</option>
            <option value="online">Online</option>
            <option value="offline">Offline</option>
          </select>
        </div>
      </div>

      <div class="map-type-control">
        <button class="map-type-btn" onclick="toggleMapTypeMenu()" title="Đổi loại bản đồ">🗺</button>
        <div id="mapTypeMenu" class="map-type-menu">
          <div class="map-type-item" onclick="setBaseMap('googleHybrid')">Google Hybrid</div>
          <div class="map-type-item" onclick="setBaseMap('googleRoadmap')">Google Roadmap</div>
          <div class="map-type-item" onclick="setBaseMap('googleSatellite')">Google Satellite</div>
          <div class="map-type-item" onclick="setBaseMap('googleTerrain')">Google Terrain</div>
          <div class="map-type-item" onclick="setBaseMap('openStreetMap')">OpenStreetMap</div>
          <div class="map-type-item" onclick="setBaseMap('cartoDBPositron')">Carto Light</div>
          <div class="map-type-item" onclick="setBaseMap('cartoDBDark')">Carto Dark</div>
          <div class="map-type-item" onclick="setBaseMap('cartoDBVoyager')">Carto Voyager</div>
          <div class="map-type-item" onclick="setBaseMap('esriWorldImagery')">Esri Imagery</div>
          <div class="map-type-item" onclick="setBaseMap('esriWorldStreetMap')">Esri Street</div>
          <div class="map-type-item" onclick="setBaseMap('openTopoMap')">OpenTopoMap</div>
        </div>
      </div>

      <div class="map-legend">
        <div class="legend-item">
          <div class="legend-dot" style="background:#16a34a;"></div>
          Online
        </div>
        <div class="legend-item">
          <div class="legend-dot" style="background:#dc2626;"></div>
          Offline
        </div>
      </div>
    </div>
  </div>

</main>

<script>
AppLayout.initLayout("Logger Map");

const GOOGLE_MAPS_API_KEY = "GOOGLE_MAPS_API_KEY_HERE";

let map = null;
let loggerData = [];
let markers = [];
let markerLayer = null;
let currentBaseLayer = null;
let currentBaseMapKey = "googleHybrid";

const onlineIcon = L.icon({
  iconUrl: "/shared/icon-online.gif",
  iconSize: [30, 30],
  iconAnchor: [15, 30],
  popupAnchor: [0, -28]
});

const offlineIcon = L.icon({
  iconUrl: "/shared/icon-offline.gif",
  iconSize: [30, 30],
  iconAnchor: [15, 30],
  popupAnchor: [0, -28]
});

const baseLayers = {
  openStreetMap: {
    name: "OpenStreetMap",
    layer: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: '&copy; OpenStreetMap contributors',
      maxZoom: 19
    })
  },
  cartoDBPositron: {
    name: "Carto Light",
    layer: L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: "abcd",
      maxZoom: 20
    })
  },
  cartoDBDark: {
    name: "Carto Dark",
    layer: L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: "abcd",
      maxZoom: 20
    })
  },
  cartoDBVoyager: {
    name: "Carto Voyager",
    layer: L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: '&copy; OpenStreetMap contributors &copy; CARTO',
      subdomains: "abcd",
      maxZoom: 20
    })
  },
  esriWorldImagery: {
    name: "Esri Imagery",
    layer: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      attribution: "Tiles &copy; Esri",
      maxZoom: 19
    })
  },
  openTopoMap: {
    name: "OpenTopoMap",
    layer: L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
      attribution: "Map data &copy; OpenStreetMap contributors",
      maxZoom: 17
    })
  },
  esriWorldStreetMap: {
    name: "Esri Street",
    layer: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}", {
      attribution: "Tiles &copy; Esri",
      maxZoom: 19
    })
  },
  googleRoadmap: {
    name: "Google Roadmap",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  },
  googleSatellite: {
    name: "Google Satellite",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  },
  googleHybrid: {
    name: "Google Hybrid",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  },
  googleTerrain: {
    name: "Google Terrain",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  }
};

function initMap() {
  map = L.map("map", {
    center: [9.18, 105.16],
    zoom: 12,
    zoomControl: true
  });

  markerLayer = L.layerGroup().addTo(map);

  setBaseMap("googleHybrid");
  loadLoggerMap();

  // Đảm bảo Leaflet tính toán lại kích thước khung chứa sau khi layout ổn định
  setTimeout(() => {
    map.invalidateSize();
  }, 200);
}

function toggleMapTypeMenu() {
  document.getElementById("mapTypeMenu").classList.toggle("active");
}

document.addEventListener("click", function (e) {
  if (!e.target.closest(".map-type-control")) {
    document.getElementById("mapTypeMenu").classList.remove("active");
  }
});

function setBaseMap(key) {
  if (!baseLayers[key]) return;

  if (currentBaseLayer) {
    map.removeLayer(currentBaseLayer);
  }

  currentBaseMapKey = key;
  currentBaseLayer = baseLayers[key].layer;
  currentBaseLayer.addTo(map);

  document.getElementById("mapTypeMenu").classList.remove("active");

  document.querySelectorAll(".map-type-item").forEach(item => {
    item.classList.remove("active");
    if (item.textContent.trim() === baseLayers[key].name) {
      item.classList.add("active");
    }
  });
}

async function api(url) {
  const res = await fetch(url, { cache: "no-store" });
  const text = await res.text();
  try {
    return JSON.parse(text);
  } catch {
    return { success: false, message: "API không trả JSON", preview: text.slice(0, 300) };
  }
}

async function loadLoggerMap() {
  const json = await api("/api/logger/readings/map");

  if (!json.success) return;

  loggerData = json.data || [];
  renderMarkers();
}

function renderMarkers() {
  if (!map || !markerLayer) return;

  markerLayer.clearLayers();
  markers = [];

  const keyword = document.getElementById("searchText").value.trim().toLowerCase();
  const source  = document.getElementById("sourceFilter").value;
  const status  = document.getElementById("statusFilter").value;

  const filtered = loggerData.filter(logger => {
    if (!isValidLatLng(logger)) return false;

    const online = isLoggerOnline(logger);

    if (source && logger.source !== source) return false;
    if (status === "online"  && !online) return false;
    if (status === "offline" &&  online) return false;

    if (keyword) {
      const text = [logger.logger_id, logger.raw_id, logger.name, logger.source]
        .join(" ").toLowerCase();
      if (!text.includes(keyword)) return false;
    }

    return true;
  });

  filtered.forEach(logger => {
    const online = isLoggerOnline(logger);
    const marker = L.marker(
      [Number(logger.lat), Number(logger.lng)],
      { icon: online ? onlineIcon : offlineIcon, title: logger.name || logger.logger_id }
    );

    marker.bindTooltip(
      logger.name || logger.logger_id,
      {
        permanent: true,
        direction: "center",
        offset: [0, 11],
        className: `logger-label ${online ? "online" : "offline"}`
      }
    );

    marker.bindPopup(buildPopupHtml(logger, online), { maxWidth: 420 });

    marker.addTo(markerLayer);
    markers.push(marker);
  });

  if (filtered.length) fitAllMarkers();
}

function fitAllMarkers() {
  if (!markers.length) return;
  const group = L.featureGroup(markers);
  map.fitBounds(group.getBounds(), { padding: [40, 40], maxZoom: 15 });
}

function isValidLatLng(logger) {
  return (
    logger &&
    logger.lat !== null && logger.lng !== null &&
    logger.lat !== undefined && logger.lng !== undefined &&
    Number.isFinite(Number(logger.lat)) &&
    Number.isFinite(Number(logger.lng))
  );
}

function isLoggerOnline(logger) {
  if (Number(logger.enabled) === 0) return false;

  const tags = Object.values(logger.tags || {});
  if (!tags.length) return false;

  const latestTs = tags.map(t => t.data_ts).filter(Boolean).sort().pop();
  if (!latestTs) return false;

  const ts = new Date(String(latestTs).replace(" ", "T"));
  if (Number.isNaN(ts.getTime())) return false;

  return Date.now() - ts.getTime() <= 30 * 60 * 1000;
}

function buildPopupHtml(logger, online) {
  const tags = Object.values(logger.tags || {});

  const tagRows = tags.length
    ? tags.map(tag => `
      <tr>
        <td>${escapeHtml(tag.tag_name || tag.tag_key)}</td>
        <td><b>${formatNumber(tag.value)}</b> ${escapeHtml(tag.unit || "")}</td>
        <td>${escapeHtml(tag.data_ts || "")}</td>
      </tr>`).join("")
    : `<tr><td colspan="3">Chưa có tag/data</td></tr>`;

  return `
    <div class="popup">
      <h3>${escapeHtml(logger.name || logger.logger_id)}</h3>
      <div class="meta">
        <b>Logger ID:</b> ${escapeHtml(logger.logger_id)}<br>
        <b>Raw ID:</b> ${escapeHtml(logger.raw_id || "")}<br>
        <b>Nguồn:</b> ${escapeHtml(logger.source || "")}<br>
        <b>Toạ độ:</b> ${escapeHtml(logger.lat)}, ${escapeHtml(logger.lng)}<br>
        <b>Trạng thái:</b>
        <span class="${online ? "status-online" : "status-offline"}">
          ${online ? "Online" : "Offline"}
        </span>
      </div>
      <table class="popup-table">
        <thead>
          <tr><th>Tag</th><th>Giá trị</th><th>Thời gian</th></tr>
        </thead>
        <tbody>${tagRows}</tbody>
      </table>
    </div>`;
}

function formatNumber(value) {
  if (value === null || value === undefined || value === "") return "--";
  const n = Number(value);
  if (Number.isNaN(n)) return value;
  return new Intl.NumberFormat("vi-VN", { maximumFractionDigits: 3 }).format(n);
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

initMap();
</script>
</body>
</html>
