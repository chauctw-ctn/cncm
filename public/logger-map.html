<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Logger Map</title>

  <link rel="stylesheet" href="/shared/layout.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <link rel="stylesheet" href="/logger-map.css">

  <script src="/shared/auth.js"></script>
  <script src="/shared/layout.js"></script>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
</head>

<body>
<script>
  AppLayout.initLayout("Logger Map");
</script>

<main class="page-content">
  <div class="card card-full-map">
    <div class="map-wrap">
      <div id="map"></div>

      <div class="map-tool-column">
        <button class="map-tool-btn" onclick="toggleToolPanel('searchPanel')" title="Tìm kiếm">🔍</button>
        <button class="map-tool-btn" onclick="toggleToolPanel('sourcePanel')" title="Lọc nguồn">🗄</button>
        <button class="map-tool-btn" onclick="toggleToolPanel('statusPanel')" title="Lọc trạng thái">📡</button>
        <button class="map-tool-btn" onclick="toggleMapTypeMenu()" title="Đổi loại bản đồ">🗺</button>

        <div id="searchPanel" class="map-popup-panel">
          <input id="searchText" placeholder="Tìm logger / trạm..." oninput="renderMarkers()">
        </div>

        <div id="sourcePanel" class="map-popup-panel">
          <label><input type="checkbox" class="source-check" value="mqtt" checked onchange="updateSourceFilter()"> MQTT</label>
          <label><input type="checkbox" class="source-check" value="scada" checked onchange="updateSourceFilter()"> SCADA</label>
          <label><input type="checkbox" class="source-check" value="monre" checked onchange="updateSourceFilter()"> MONRE</label>
          <label><input type="checkbox" class="source-check" value="tva" checked onchange="updateSourceFilter()"> TVA</label>
        </div>

        <div id="statusPanel" class="map-popup-panel">
          <label><input type="radio" name="statusFilter" value="" checked onchange="renderMarkers()"> Tất cả</label>
          <label><input type="radio" name="statusFilter" value="online" onchange="renderMarkers()"> Online</label>
          <label><input type="radio" name="statusFilter" value="offline" onchange="renderMarkers()"> Offline</label>
        </div>

        <div id="mapTypeMenu" class="map-popup-panel map-type-menu">
          <button type="button" onclick="setBaseMap('googleHybrid')">Google Hybrid</button>
          <button type="button" onclick="setBaseMap('googleRoadmap')">Google Roadmap</button>
          <button type="button" onclick="setBaseMap('googleSatellite')">Google Satellite</button>
          <button type="button" onclick="setBaseMap('googleTerrain')">Google Terrain</button>
          <button type="button" onclick="setBaseMap('openStreetMap')">OpenStreetMap</button>
          <button type="button" onclick="setBaseMap('cartoDBPositron')">Carto Light</button>
          <button type="button" onclick="setBaseMap('cartoDBDark')">Carto Dark</button>
          <button type="button" onclick="setBaseMap('cartoDBVoyager')">Carto Voyager</button>
          <button type="button" onclick="setBaseMap('esriWorldImagery')">Esri Imagery</button>
          <button type="button" onclick="setBaseMap('esriWorldStreetMap')">Esri Street</button>
          <button type="button" onclick="setBaseMap('openTopoMap')">OpenTopoMap</button>
        </div>
      </div>

      <div class="map-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#16a34a;"></div>Online</div>
        <div class="legend-item"><div class="legend-dot" style="background:#dc2626;"></div>Offline</div>
      </div>
    </div>
  </div>
</main>

<script>
const GOOGLE_MAPS_API_KEY = "GOOGLE_MAPS_API_KEY_HERE";

let map = null;
let loggerData = [];
let markers = [];
let markerLayer = null;
let currentBaseLayer = null;

const onlineIcon = L.icon({
  iconUrl: "/shared/icon-online.gif",
  iconSize: [30, 30],
  iconAnchor: [15, 30],
  popupAnchor: [0, -28]
});

const offlineIcon = L.icon({
  iconUrl: "/shared/icon-offline.gif",
  iconSize: [30, 30],
  iconAnchor: [15, 30],
  popupAnchor: [0, -28]
});

const baseLayers = {
  openStreetMap: {
    name: "OpenStreetMap",
    layer: L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      attribution: "&copy; OpenStreetMap contributors",
      maxZoom: 19
    })
  },
  cartoDBPositron: {
    name: "Carto Light",
    layer: L.tileLayer("https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
      subdomains: "abcd",
      maxZoom: 20
    })
  },
  cartoDBDark: {
    name: "Carto Dark",
    layer: L.tileLayer("https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
      subdomains: "abcd",
      maxZoom: 20
    })
  },
  cartoDBVoyager: {
    name: "Carto Voyager",
    layer: L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
      attribution: "&copy; OpenStreetMap contributors &copy; CARTO",
      subdomains: "abcd",
      maxZoom: 20
    })
  },
  esriWorldImagery: {
    name: "Esri Imagery",
    layer: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}", {
      attribution: "Tiles &copy; Esri",
      maxZoom: 19
    })
  },
  openTopoMap: {
    name: "OpenTopoMap",
    layer: L.tileLayer("https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png", {
      attribution: "Map data &copy; OpenStreetMap contributors",
      maxZoom: 17
    })
  },
  esriWorldStreetMap: {
    name: "Esri Street",
    layer: L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}", {
      attribution: "Tiles &copy; Esri",
      maxZoom: 19
    })
  },
  googleRoadmap: {
    name: "Google Roadmap",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  },
  googleSatellite: {
    name: "Google Satellite",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=s&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  },
  googleHybrid: {
    name: "Google Hybrid",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  },
  googleTerrain: {
    name: "Google Terrain",
    layer: L.tileLayer("https://mt1.google.com/vt/lyrs=p&x={x}&y={y}&z={z}&key=" + GOOGLE_MAPS_API_KEY, {
      attribution: "&copy; Google Maps",
      maxZoom: 20
    })
  }
};

function initMap() {
  map = L.map("map", {
    center: [9.18, 105.16],
    zoom: 12,
    zoomControl: false
  });

  markerLayer = L.layerGroup().addTo(map);

  setBaseMap("googleHybrid");
  loadLoggerMap();

  setTimeout(() => map.invalidateSize(), 300);
}

function closePanels() {
  document.querySelectorAll(".map-popup-panel").forEach(panel => panel.classList.remove("active"));
}

function toggleToolPanel(id) {
  const panel = document.getElementById(id);
  const isActive = panel.classList.contains("active");

  closePanels();

  if (!isActive) {
    panel.classList.add("active");
  }
}

function toggleMapTypeMenu() {
  toggleToolPanel("mapTypeMenu");
}

document.addEventListener("click", e => {
  if (!e.target.closest(".map-tool-column")) {
    closePanels();
  }
});

function getSelectedSources() {
  return Array.from(document.querySelectorAll(".source-check:checked"))
    .map(cb => cb.value);
}

function getSelectedStatus() {
  const checked = document.querySelector('input[name="statusFilter"]:checked');
  return checked ? checked.value : "";
}

function updateSourceFilter() {
  renderMarkers();
}

function setBaseMap(key) {
  if (!baseLayers[key]) return;

  if (currentBaseLayer) {
    map.removeLayer(currentBaseLayer);
  }

  currentBaseLayer = baseLayers[key].layer;
  currentBaseLayer.addTo(map);

  document.querySelectorAll(".map-type-menu button").forEach(btn => {
    btn.classList.toggle("active", btn.textContent.trim() === baseLayers[key].name);
  });

  closePanels();
}

async function api(url) {
  const res = await fetch(url, { cache: "no-store" });
  const text = await res.text();

  try {
    return JSON.parse(text);
  } catch {
    return {
      success: false,
      message: "API không trả JSON",
      preview: text.slice(0, 300)
    };
  }
}

async function loadLoggerMap() {
  const json = await api("/api/logger/readings/map");
  if (!json.success) return;

  loggerData = json.data || [];
  renderMarkers();
}

function renderMarkers() {
  if (!map || !markerLayer) return;

  markerLayer.clearLayers();
  markers = [];

  const keyword = document.getElementById("searchText").value.trim().toLowerCase();
  const selectedSources = getSelectedSources();
  const status = getSelectedStatus();

  const filtered = loggerData.filter(logger => {
    if (!isValidLatLng(logger)) return false;

    const online = isLoggerOnline(logger);

    if (selectedSources.length && !selectedSources.includes(logger.source)) return false;
    if (status === "online" && !online) return false;
    if (status === "offline" && online) return false;

    if (keyword) {
      const text = [logger.logger_id, logger.raw_id, logger.name, logger.source]
        .join(" ")
        .toLowerCase();

      if (!text.includes(keyword)) return false;
    }

    return true;
  });

  filtered.forEach(logger => {
    const online = isLoggerOnline(logger);

    const marker = L.marker(
      [Number(logger.lat), Number(logger.lng)],
      {
        icon: online ? onlineIcon : offlineIcon,
        title: logger.name || logger.logger_id
      }
    );

    marker.bindTooltip(
      logger.name || logger.logger_id,
      {
        permanent: true,
        direction: "center",
        offset: [0, 11],
        className: `logger-label ${online ? "online" : "offline"}`
      }
    );

    marker.bindPopup(buildPopupHtml(logger, online), { maxWidth: 420 });

    marker.addTo(markerLayer);
    markers.push(marker);
  });

  if (filtered.length) fitAllMarkers();
}

function fitAllMarkers() {
  if (!markers.length) return;

  const group = L.featureGroup(markers);

  map.fitBounds(group.getBounds(), {
    padding: [40, 40],
    maxZoom: 15
  });
}

function isValidLatLng(logger) {
  return (
    logger &&
    logger.lat !== null &&
    logger.lng !== null &&
    logger.lat !== undefined &&
    logger.lng !== undefined &&
    Number.isFinite(Number(logger.lat)) &&
    Number.isFinite(Number(logger.lng))
  );
}

function isLoggerOnline(logger) {
  if (Number(logger.enabled) === 0) return false;

  const tags = Object.values(logger.tags || {});
  if (!tags.length) return false;

  const latestTs = tags.map(t => t.data_ts).filter(Boolean).sort().pop();
  if (!latestTs) return false;

  const ts = new Date(String(latestTs).replace(" ", "T"));
  if (Number.isNaN(ts.getTime())) return false;

  return Date.now() - ts.getTime() <= 30 * 60 * 1000;
}

function buildPopupHtml(logger, online) {
  const tags = Object.values(logger.tags || {});

  const tagRows = tags.length
    ? tags.map(tag => `
      <tr>
        <td>${escapeHtml(tag.tag_name || tag.tag_key)}</td>
        <td><b>${formatNumber(tag.value)}</b> ${escapeHtml(tag.unit || "")}</td>
        <td>${escapeHtml(tag.data_ts || "")}</td>
      </tr>
    `).join("")
    : `<tr><td colspan="3">Chưa có tag/data</td></tr>`;

  return `
    <div class="popup">
      <h3>${escapeHtml(logger.name || logger.logger_id)}</h3>
      <div class="meta">
        <b>Logger ID:</b> ${escapeHtml(logger.logger_id)}<br>
        <b>Raw ID:</b> ${escapeHtml(logger.raw_id || "")}<br>
        <b>Nguồn:</b> ${escapeHtml(logger.source || "")}<br>
        <b>Toạ độ:</b> ${escapeHtml(logger.lat)}, ${escapeHtml(logger.lng)}<br>
        <b>Trạng thái:</b>
        <span class="${online ? "status-online" : "status-offline"}">
          ${online ? "Online" : "Offline"}
        </span>
      </div>

      <table class="popup-table">
        <thead>
          <tr>
            <th>Tag</th>
            <th>Giá trị</th>
            <th>Thời gian</th>
          </tr>
        </thead>
        <tbody>${tagRows}</tbody>
      </table>
    </div>
  `;
}

function formatNumber(value) {
  if (value === null || value === undefined || value === "") return "--";

  const n = Number(value);

  if (Number.isNaN(n)) return value;

  return new Intl.NumberFormat("vi-VN", {
    maximumFractionDigits: 3
  }).format(n);
}

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#039;");
}

window.addEventListener("resize", () => {
  if (map) {
    setTimeout(() => map.invalidateSize(), 250);
  }
});

const layoutObserver = new MutationObserver(() => {
  if (map) {
    setTimeout(() => map.invalidateSize(), 300);
  }
});

layoutObserver.observe(document.body, {
  attributes: true,
  attributeFilter: ["class"]
});

initMap();
</script>
</body>
</html>
